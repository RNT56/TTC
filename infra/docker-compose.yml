# FORGE data plane (architecture §6): one stateful service — Postgres 16 with
# pgvector — plus the gateway. GPU workers burst externally; nothing here
# exposes the compute plane.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge-dev-only}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Gateway: run from source in development (pnpm --filter @forge/gateway dev).
  # A production image (node:22-slim + dist + the forge-validate binary) lands
  # with first deploy; FORGE_VALIDATE_BIN points the gateway at the binary.

volumes:
  pgdata:
