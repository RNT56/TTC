# FORGE local/prod-like runtime. Modal is the configured burst GPU provider;
# fixtures remain the default worker backend for CI and local acceptance.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge-dev-only}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-permissions:
    # MinIO stopped publishing official Docker images after the 2025-10-15
    # security release. This Alpine rebuild is pinned to that exact source tag
    # and manifest digest; its declared minio user is UID 100/GID 101. This
    # one-shot initializer owns only the persistent data volume and exits before
    # the non-root service starts.
    image: alpine/minio:RELEASE.2025-10-15T17-29-55Z@sha256:cf23643a6cf9ce159c57643ceb88279e431262282428c9e0bf3a7ef1a97e84b4
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["chown -R 100:101 /data"]
    volumes:
      - minio:/data

  minio:
    image: alpine/minio:RELEASE.2025-10-15T17-29-55Z@sha256:cf23643a6cf9ce159c57643ceb88279e431262282428c9e0bf3a7ef1a97e84b4
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-forge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-forge-dev-only}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data
    depends_on:
      minio-permissions:
        condition: service_completed_successfully

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    profiles: ["app"]
    entrypoint: /bin/sh
    command: >
      -lc "until mc alias set forge-minio http://minio:9000 ${MINIO_ROOT_USER:-forge} ${MINIO_ROOT_PASSWORD:-forge-dev-only}; do sleep 1; done
      && mc mb -p forge-minio/${FORGE_OBJECT_BUCKET:-forge-artifacts}
      && mc anonymous set none forge-minio/${FORGE_OBJECT_BUCKET:-forge-artifacts}"
    depends_on:
      - minio

  gateway:
    image: node:24-slim
    profiles: ["app"]
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm --filter @forge/gateway dev"
    environment:
      DATABASE_URL: postgres://forge:${POSTGRES_PASSWORD:-forge-dev-only}@postgres:5432/forge
      FORGE_CATALOG_DIR: /workspace/catalog
      FORGE_VALIDATE_BIN: /workspace/target/debug/forge-validate
      AUTH_URL: ${AUTH_URL:-http://localhost:8080}
      AUTH_SECRET: ${AUTH_SECRET:-forge-dev-auth-secret-change-me}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      FORGE_OBJECT_ENDPOINT: http://minio:9000
      FORGE_OBJECT_BUCKET: ${FORGE_OBJECT_BUCKET:-forge-artifacts}
      FORGE_OBJECT_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-forge}
      FORGE_OBJECT_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-forge-dev-only}
      FORGE_OBJECT_FORCE_PATH_STYLE: "1"
      FORGE_GPU_BACKEND: ${FORGE_GPU_BACKEND:-fixture}
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  studio:
    image: node:24-slim
    profiles: ["app"]
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm --dir packages/studio dev -- --host 0.0.0.0"
    environment:
      # Keep browser requests same-origin and let Vite proxy into the Compose
      # network. Pointing the browser at :8080 directly requires a CORS policy
      # and preflight surface that the gateway intentionally does not expose.
      FORGE_GATEWAY_PROXY: http://gateway:8080
    ports:
      - "5173:5173"
    volumes:
      - ..:/workspace
    depends_on:
      - gateway

  workers:
    image: python:3.12-slim
    profiles: ["app"]
    working_dir: /workspace/workers
    command: sh -lc "pip install -e '.[queue]' >/tmp/forge-worker-install.log && python -m forge_workers.runner"
    environment:
      DATABASE_URL: postgres://forge:${POSTGRES_PASSWORD:-forge-dev-only}@postgres:5432/forge
      FORGE_OBJECT_ENDPOINT: http://minio:9000
      FORGE_OBJECT_BUCKET: ${FORGE_OBJECT_BUCKET:-forge-artifacts}
      FORGE_OBJECT_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-forge}
      FORGE_OBJECT_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-forge-dev-only}
      FORGE_OBJECT_FORCE_PATH_STYLE: "1"
      FORGE_GPU_BACKEND: ${FORGE_GPU_BACKEND:-fixture}
      MODAL_TOKEN_ID: ${MODAL_TOKEN_ID:-}
      MODAL_TOKEN_SECRET: ${MODAL_TOKEN_SECRET:-}
    volumes:
      - ..:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  pgdata:
  minio:
