[package]
name = "forge-desktop"
version = "0.2.0"
edition = "2021"
license = "Apache-2.0"

[workspace]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
base64 = "0.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
serialport = "4"
reqwest = { version = "=0.13.4", default-features = false, features = ["blocking", "rustls"] }
tauri = { version = "2", features = [] }
