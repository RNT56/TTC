[package]
name = "forge-desktop"
version = "0.2.0"
edition = "2021"
license = "Apache-2.0"

[workspace]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
serialport = "4"
tauri = { version = "2", features = [] }

[target.'cfg(unix)'.dev-dependencies]
libc = "0.2"
