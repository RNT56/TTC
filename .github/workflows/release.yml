name: release
# Tag v* (or dispatch) → the static forge-validate binary + the wasm facade
# package as downloadable artifacts. Publication to crates.io/npm (P2-001)
# remains a separate, owner-keyed step.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: prepare validator release artifacts
        run: pnpm release:validator
      - uses: actions/upload-artifact@v7
        with:
          name: forgedttc-release
          path: dist-release
