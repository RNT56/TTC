name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "40 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: reject mutable workflow action references
        run: node scripts/check-actions-pinned.mjs
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: low

  dependency-audit:
    name: dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - name: npm advisory audit
        run: pnpm audit --audit-level low
      - name: RustSec advisory audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Desktop RustSec advisory audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: packages/desktop/src-tauri
      - name: Python training-runtime advisory audit
        run: |
          python -m pip install --upgrade --only-binary=:all: pip==26.1.2 pip-audit==2.10.1
          python -m pip install --only-binary=:all: --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple torch==2.13.0
          python -m pip install --only-binary=:all: -e "workers[training,mjx,deployment,codesign]"
          python -m pip_audit --local --skip-editable

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: /language:${{ matrix.language }}

  sbom:
    name: source SBOM (SPDX)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: generate source SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: forge-source.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: validate SBOM structure
        run: |
          python3 - <<'PY'
          import json

          with open("forge-source.spdx.json", encoding="utf-8") as handle:
              sbom = json.load(handle)
          assert sbom.get("spdxVersion", "").startswith("SPDX-"), "missing SPDX version"
          assert sbom.get("packages"), "SBOM contains no packages"
          print(f"validated {len(sbom['packages'])} SPDX packages")
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: forge-source-sbom
          path: forge-source.spdx.json
