name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "40 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: reject mutable workflow action references
        run: node scripts/check-actions-pinned.mjs
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: low

  dependency-audit:
    name: dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - name: npm advisory audit
        run: pnpm audit --audit-level low
      - name: RustSec advisory audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Desktop RustSec advisory audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: packages/desktop/src-tauri
      - name: Python training-runtime advisory audit
        run: |
          python -m pip install --upgrade --only-binary=:all: pip==26.1.2 pip-audit==2.10.1
          python -m pip install --only-binary=:all: --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple torch==2.13.0
          python -m pip install --only-binary=:all: -e "workers[training,mjx,deployment]"
          python -m pip_audit --local --skip-editable

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: /language:${{ matrix.language }}

  sbom:
    name: source SBOM (SPDX)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: generate source SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: forge-source.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: validate SBOM structure
        run: |
          python3 - <<'PY'
          import json

          with open("forge-source.spdx.json", encoding="utf-8") as handle:
              sbom = json.load(handle)
          assert sbom.get("spdxVersion", "").startswith("SPDX-"), "missing SPDX version"
          assert sbom.get("packages"), "SBOM contains no packages"
          print(f"validated {len(sbom['packages'])} SPDX packages")
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: forge-source-sbom
          path: forge-source.spdx.json
