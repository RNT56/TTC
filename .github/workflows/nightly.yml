name: nightly
# Heavier gates that would add latency or flake risk to every PR: the
# parity gallery (headless chromium + SwiftShader) and code coverage.
on:
  schedule:
    - cron: "20 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parity-gallery:
    name: golden-scene parity gallery (P1-015)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@c0e9df88980754dd93e5833b8dcb1b304c1fe173 # 1.96.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: install headless chromium
        run: pnpm exec playwright-core install chromium
      - name: run full-Studio WebGL gallery (edge-F1 >= 0.85, <= 40 draws)
        run: pnpm parity
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: parity-gallery
          path: artifacts/parity

  coverage:
    name: core coverage (>=80% lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@c0e9df88980754dd93e5833b8dcb1b304c1fe173 # 1.96.0
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@9458fed45835344deb5e69e06e831be047c96abf # cargo-llvm-cov
      - name: coverage summary
        run: cargo llvm-cov --workspace --summary-only --fail-under-lines 80
