name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

permissions:
  contents: read

jobs:
  core:
    name: forge-core (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - name: golden artifact update policy
        run: |
          node --test scripts/golden-artifact-policy.test.mjs
          node --test scripts/parity-gallery-policy.test.mjs
          node scripts/check-golden-artifacts.mjs
      - name: external acceptance evidence policy
        run: |
          node --test scripts/external-acceptance-policy.test.mjs
          node scripts/external-acceptance.mjs check
      - uses: dtolnay/rust-toolchain@c0e9df88980754dd93e5833b8dcb1b304c1fe173 # 1.96.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy (deny warnings)
        run: cargo clippy --workspace -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: wasm facade cross-compiles
        run: cargo build -p forge-wasm --target wasm32-unknown-unknown
      - name: gatekeeper admits the demo contract
        run: cargo run -p forge-validate -- run examples/vx2-mini.forge.json
      - name: schema is current (single source, D16)
        run: |
          cargo run -q -p forge-validate -- schema --out /tmp/schema.json
          diff -q /tmp/schema.json schema/forge-modelspec.schema.json \
            || { echo "::error::schema drifted — run: pnpm codegen:contract"; exit 1; }
      - name: upload validator binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: forge-validate
          path: target/debug/forge-validate

  face:
    name: studio + gateway (TypeScript)
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@c0e9df88980754dd93e5833b8dcb1b304c1fe173 # 1.96.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        # version comes from package.json "packageManager" — pinning it here too
        # makes the action error out with "Multiple versions of pnpm specified"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - name: build validator binary for gateway tests
        run: cargo build -p forge-validate
      - run: pnpm install --frozen-lockfile
      - name: generated API, event, artifact, and compatibility contracts
        run: |
          pnpm verify:compatibility
          pnpm verify:docs-contracts
      - name: build studio + gateway
        run: pnpm -r build
      - name: gateway tests (spawns the gatekeeper)
        run: pnpm --filter @forge/gateway test
      - name: P4 Brief-25 deterministic generation eval
        run: pnpm eval:brief25 -- --validator real --out artifacts/evals/brief25-ci.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: brief25-eval
          path: artifacts/evals/brief25-ci.json
      - name: P0-004 byte-equivalence — translations vs the frozen monolith
        run: |
          node scripts/extract-counts.mjs prototype/cad-object-studio.html --out /tmp/extracted.json
          diff <(python3 -c "import json;d=json.load(open('/tmp/extracted.json'));print(json.dumps(d['models']))") \
               <(python3 -c "import json;d=json.load(open('prototype/extracted-counts.json'));print(json.dumps(d['models']))") \
            || { echo "::error::extraction drifted from the committed oracle"; exit 1; }
          node scripts/translate-monolith.mjs
          git diff --exit-code examples/hrx7.forge.json examples/vx2-hornet.forge.json \
            || { echo "::error::translations drifted — regenerate via scripts/translate-monolith.mjs"; exit 1; }
          cargo run -q -p forge-validate -- bake examples/hrx7.forge.json --out /tmp/hrx7.bake.json
          cargo run -q -p forge-validate -- bake examples/vx2-hornet.forge.json --out /tmp/vx2.bake.json
          node scripts/compare-counts.mjs prototype/extracted-counts.json /tmp/hrx7.bake.json /tmp/vx2.bake.json
      - name: XT-001 golden numbers — native ↔ WASM bit-identical (D17)
        run: |
          cargo build -p forge-wasm --bin forge-golden
          pnpm exec wasm-pack build crates/forge-wasm --target web --release --out-dir /tmp/wasm-fresh --out-name forge_wasm
          node scripts/golden-compare.mjs --pkg /tmp/wasm-fresh --bin target/debug/forge-golden
          node scripts/golden-compare.mjs --pkg packages/studio/src/wasm-pkg --bin target/debug/forge-golden \
            || { echo "::error::committed wasm-pkg is stale — run pnpm build:wasm and commit"; exit 1; }
      - name: P1-005 performance budgets — bake ≤ 60 ms, patch ≤ 10 ms (binding)
        run: node scripts/budgets.mjs --pkg /tmp/wasm-fresh
      - name: P2-006 declared verdicts on every first-party contract
        run: node scripts/validate-all.mjs
      - name: trajectory oracle tapes are deterministic and current
        run: |
          node scripts/extract-trajectories.mjs
          git diff --exit-code prototype/trajectories \
            || { echo "::error::tapes drifted — the recorder or the frozen prototype changed"; exit 1; }

  data-plane:
    name: catalog data plane (Postgres)
    runs-on: ubuntu-latest
    needs: core
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: forge
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge-dev-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forge -d forge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://forge:forge-dev-only@localhost:5432/forge
      FORGE_OBJECT_ENDPOINT: http://127.0.0.1:9000
      FORGE_OBJECT_BUCKET: forge-artifacts
      FORGE_OBJECT_ACCESS_KEY_ID: forge
      FORGE_OBJECT_SECRET_ACCESS_KEY: forge-dev-only
      FORGE_OBJECT_FORCE_PATH_STYLE: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: forge-validate
          path: target/debug
      - name: prepare validator and browser prerequisites
        run: |
          chmod +x target/debug/forge-validate
          pnpm exec playwright-core install --with-deps chromium firefox webkit
      - run: python -m pip install -e "workers[queue]"
      - name: start pinned S3-compatible policy object store
        run: |
          docker run --detach --name forge-minio \
            --publish 9000:9000 \
            --tmpfs /data:rw,uid=100,gid=101,mode=0700 \
            --env MINIO_ROOT_USER=forge \
            --env MINIO_ROOT_PASSWORD=forge-dev-only \
            alpine/minio:RELEASE.2025-10-15T17-29-55Z@sha256:cf23643a6cf9ce159c57643ceb88279e431262282428c9e0bf3a7ef1a97e84b4 \
            server /data
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:9000/minio/health/ready >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs forge-minio
              exit 1
            fi
            sleep 1
          done
          docker run --rm --network host --entrypoint /bin/sh \
            minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727 \
            -c 'mc alias set forge http://127.0.0.1:9000 forge forge-dev-only && mc mb --ignore-existing forge/forge-artifacts && mc anonymous set none forge/forge-artifacts'
      - name: isolated Postgres and real-browser acceptance
        env:
          FORGE_BROWSER_E2E: "1"
          FORGE_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: pnpm verify:db
      - name: accessibility and supported-browser acceptance
        env:
          FORGE_BROWSER_SUPPORT: "1"
          FORGE_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: pnpm verify:browser-support
      - name: assert transactional commerce worker materialization
        run: python workers/integration/assert_commerce_postgres.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: browser-acceptance-evidence
          path: artifacts/e2e

  workers:
    name: compute workers (Python)
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: forge-validate
          path: target/debug
      - run: chmod +x target/debug/forge-validate
      - name: install exact CPU training runtime
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple torch==2.13.0
          pip install -e "workers[dev,mujoco,training,mjx,deployment,codesign]"
      - run: python -m pytest workers -q
      - name: D62 co-design cross-platform authority policy
        run: node --test scripts/codesign-platform-compare.test.mjs
      - name: P7-003/P7-014 real seeded multirotor + ground MuJoCo-SB3-ONNX smoke
        env:
          FORGE_VALIDATE_BIN: target/debug/forge-validate
          FORGE_SOURCE_REVISION: ${{ github.sha }}
          FORGE_REQUIRE_CLEAN_EVIDENCE: "1"
        run: node scripts/training-smoke.mjs --out artifacts/training/p7-sb3-smoke.json
      - name: P7-009 exact telemetry BC + randomized PPO fine-tune
        env:
          FORGE_VALIDATE_BIN: target/debug/forge-validate
          FORGE_SOURCE_REVISION: ${{ github.sha }}
          FORGE_REQUIRE_CLEAN_EVIDENCE: "1"
        run: node scripts/offline-training-smoke.mjs --out artifacts/training/p7-offline-training.json
      - name: P6-010 live Rapier-MuJoCo engine parity
        env:
          FORGE_MUJOCO_PARITY_CMD: python -m forge_workers.mujoco_parity
          FORGE_SOURCE_REVISION: ${{ github.sha }}
        run: node scripts/sim-parity.mjs --out artifacts/sim-parity
      - name: P7-010 controlled MuJoCo-MJX feasibility
        env:
          FORGE_VALIDATE_BIN: target/debug/forge-validate
          FORGE_SOURCE_REVISION: ${{ github.sha }}
          FORGE_REQUIRE_CLEAN_EVIDENCE: "1"
        run: node scripts/mjx-feasibility-smoke.mjs --out artifacts/mjx/p7-mjx-feasibility.json
      - name: D59 controlled native, Rapier, and MuJoCo co-design smoke
        env:
          FORGE_VALIDATE_BIN: target/debug/forge-validate
          FORGE_SOURCE_REVISION: ${{ github.sha }}
          FORGE_REQUIRE_CLEAN_EVIDENCE: "1"
        run: node scripts/codesign-engine-smoke.mjs --out artifacts/codesign/p9-engine-smoke.json
      - name: D60 pinned CMA-ES and Optuna TPE co-design search plan
        env:
          FORGE_SOURCE_REVISION: ${{ github.sha }}
          FORGE_REQUIRE_CLEAN_EVIDENCE: "1"
        run: node scripts/codesign-search-plan-smoke.mjs --out artifacts/codesign/p9-search-plan.json
      - name: D61 checkpointed exact-hash 200-candidate co-design engine batch
        env:
          FORGE_VALIDATE_BIN: target/debug/forge-validate
          FORGE_SOURCE_REVISION: ${{ github.sha }}
          FORGE_REQUIRE_CLEAN_EVIDENCE: "1"
        run: node scripts/codesign-engine-batch-smoke.mjs --out artifacts/codesign/p9-engine-batch.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: sim-engine-parity-evidence
          path: artifacts/sim-parity
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: training-runtime-evidence
          path: artifacts/training
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: mjx-feasibility-evidence
          path: artifacts/mjx
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: codesign-engine-smoke-evidence
          path: artifacts/codesign

  desktop-native:
    name: desktop native (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@c0e9df88980754dd93e5833b8dcb1b304c1fe173 # 1.96.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: packages/desktop/src-tauri -> target
      - name: compile the native Tauri shell
        run: cargo check --locked --manifest-path packages/desktop/src-tauri/Cargo.toml
