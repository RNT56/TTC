name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: forge-core (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy (deny warnings)
        run: cargo clippy --workspace -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: wasm facade cross-compiles
        run: cargo build -p forge-wasm --target wasm32-unknown-unknown
      - name: gatekeeper admits the demo contract
        run: cargo run -p forge-validate -- run examples/vx2-mini.forge.json
      - name: schema is current (single source, D16)
        run: |
          cargo run -q -p forge-validate -- schema --out /tmp/schema.json
          diff -q /tmp/schema.json schema/forge-modelspec.schema.json \
            || { echo "::error::schema drifted — run: pnpm codegen:contract"; exit 1; }
      - name: upload validator binary
        uses: actions/upload-artifact@v4
        with:
          name: forge-validate
          path: target/debug/forge-validate

  face:
    name: studio + gateway (TypeScript)
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: build validator binary for gateway tests
        run: cargo build -p forge-validate
      - run: pnpm install --frozen-lockfile
      - name: build studio + gateway
        run: pnpm -r build
      - name: gateway tests (spawns the gatekeeper)
        run: pnpm --filter @forge/gateway test

  workers:
    name: compute workers (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "workers[dev]"
      - run: python -m pytest workers -q
