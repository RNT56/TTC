packages:
  - "packages/*"
  - "workers"

# Security convergence pins apply only when an existing dependency range already
# admits the patched version. Remove each pin after every parent converges and the
# low-severity audit remains green without it.
overrides:
  "fast-uri@": "3.1.4"
  "js-yaml@": "4.3.0"
  "tar@": "7.5.20"

# pnpm 11 fails closed when a dependency lifecycle script is not explicitly
# reviewed. Keep this list version-exact; dependency updates must re-review it.
allowBuilds:
  esbuild@0.25.12: true
  esbuild@0.28.1: true
  protobufjs@7.6.5: false
  wasm-pack@0.15.0: true
