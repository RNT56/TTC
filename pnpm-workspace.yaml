packages:
  - "packages/*"
  - "workers"

# pnpm 11 fails closed when a dependency lifecycle script is not explicitly
# reviewed. Keep this list version-exact; dependency updates must re-review it.
allowBuilds:
  esbuild@0.25.12: true
  esbuild@0.28.1: true
  protobufjs@7.6.5: false
  wasm-pack@0.15.0: true
